name: Bug report
description: Report a reproducible bug or defect in WorldSignal.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please search
        [existing issues](https://github.com/jigardafda/WorldSignal/issues)
        first to avoid duplicates.

        Do not report security vulnerabilities here — see our
        [Security Policy](https://github.com/jigardafda/WorldSignal/security/policy).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug and its impact.
      placeholder: Tell us what you saw.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Configure '...'
        2. Run '...'
        3. Observe '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: WorldSignal release tag or git commit SHA.
      placeholder: "v0.1.0 or abc1234"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of the system is affected?
      options:
        - Backend (API / GraphQL / REST)
        - Backend (scheduler / workers / queue)
        - Backend (enrichment / LLM)
        - Source tooling (sourcetool)
        - Frontend (admin console)
        - Other / not sure
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system / environment
      description: OS and version, container runtime, deployment details.
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Docker 27.x"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs and output
      description: |
        Paste any relevant log output. This is automatically formatted as code,
        so no backticks are needed. Please redact secrets.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This report does not contain any secrets or credentials.
          required: true
