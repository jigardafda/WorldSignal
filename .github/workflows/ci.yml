name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_TEST_DB: postgresql://worldsignal:worldsignal@localhost:5432/worldsignal_test?sslmode=disable

jobs:
  backend-test:
    name: Backend tests (race + coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: worldsignal
          POSTGRES_PASSWORD: worldsignal
          POSTGRES_DB: worldsignal_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U worldsignal"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - name: Bootstrap base schema
        run: psql "$GO_TEST_DB" -v ON_ERROR_STOP=1 -f backend/schema/schema.sql
        env:
          PGPASSWORD: worldsignal
      - name: gofmt
        working-directory: backend
        run: test -z "$(gofmt -l . | tee /dev/stderr)"
      - name: go vet
        working-directory: backend
        run: go vet ./...
      - name: Build
        working-directory: backend
        run: go build ./...
      - name: Test (race + coverage)
        working-directory: backend
        env:
          TEST_DATABASE_URL: ${{ env.GO_TEST_DB }}
        run: |
          APP=$(go list ./... | grep -vE '/cmd/server|/cmd/sourcetool|/internal/dbtest' | paste -sd, -)
          go test ./... -race -p 1 -count=1 -coverpkg="$APP" -coverprofile=coverage.out -timeout 15m
      - name: Enforce coverage >= 95%
        working-directory: backend
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${total}%"
          awk "BEGIN{exit !(${total} >= 95.0)}" || { echo "::error::coverage ${total}% < 95%"; exit 1; }
      - uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.out

  golangci:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest # newest v2 (built with Go >= the module's 1.25 target)
          working-directory: backend
          args: --timeout=5m

  govulncheck:
    name: Vulnerability scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build-matrix:
    name: Cross-platform build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build server + sourcetool
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -o /dev/null ./cmd/server
          go build -o /dev/null ./cmd/sourcetool

  frontend:
    name: Frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:cov
      - run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: worldsignal
          POSTGRES_PASSWORD: worldsignal
          POSTGRES_DB: worldsignal_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U worldsignal"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Bootstrap e2e schema
        run: psql "postgresql://worldsignal:worldsignal@localhost:5432/worldsignal_e2e?sslmode=disable" -v ON_ERROR_STOP=1 -f backend/schema/schema.sql
        env:
          PGPASSWORD: worldsignal
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run e2e
        working-directory: frontend
        run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
