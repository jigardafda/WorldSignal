# golangci-lint v2 configuration. Run from the backend/ module
# (CI sets working-directory: backend). gosimple is folded into staticcheck in v2;
# gofmt/goimports are configured under `formatters`.
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - bodyclose
    - revive
  settings:
    staticcheck:
      # Keep SA/ST correctness checks; drop advisory "quickfix" (QF) nits and the
      # ST1003 initialism style rule (legacy identifiers like SourceGuid/StripHtml).
      checks: ["all", "-QF1002", "-QF1008", "-ST1003"]
    misspell:
      locale: US
      # British spellings kept deliberately as normalization aliases in the
      # attribute dictionary (so British-spelled input maps to canonical codes).
      ignore-rules:
        - neighbourhood
        - favourable
        - organisation
        - defence
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
  exclusions:
    generated: lax
    rules:
      # Tests favor brevity; relax the noisy linters there.
      - path: _test\.go
        linters: [errcheck, bodyclose, revive]

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes: [github.com/worldsignal]
